<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Genome</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: #e8e8e8;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  #canvas { width: 100vw; height: 100vh; }

  /* Nodes */
  .node circle {
    stroke-width: 2px;
    cursor: pointer;
    transition: stroke 0.15s;
  }
  .node circle:hover { stroke: #fff !important; stroke-width: 3px; }
  .node.active circle { stroke: #fff !important; stroke-width: 3px; }

  .node text {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    pointer-events: none;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.8);
  }

  /* Edges */
  .link {
    stroke: rgba(255,255,255,0.12);
    stroke-width: 1.5px;
  }
  .link.highlighted {
    stroke: rgba(255,255,255,0.55);
    stroke-width: 2.5px;
  }

  /* Panel */
  #panel {
    position: fixed;
    top: 0; right: 0;
    width: 340px;
    height: 100vh;
    background: rgba(13,13,13,0.96);
    border-left: 1px solid rgba(255,255,255,0.08);
    padding: 28px 24px;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    z-index: 100;
  }
  #panel.open { transform: translateX(0); }

  #panel-close {
    position: absolute;
    top: 16px; right: 18px;
    background: none; border: none;
    color: rgba(255,255,255,0.4);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
  }
  #panel-close:hover { color: #fff; }

  #panel h2 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  #panel .era {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 14px;
    letter-spacing: 0.03em;
  }
  #panel .desc {
    font-size: 12.5px;
    line-height: 1.65;
    color: rgba(255,255,255,0.7);
    margin-bottom: 18px;
  }

  .section-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 8px;
    margin-top: 18px;
  }

  .edges-list {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 4px;
  }
  .edge-tag {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    transition: background 0.1s;
  }
  .edge-tag:hover { background: rgba(255,255,255,0.15); color: #fff; }

  .tracks-list {
    list-style: none;
  }
  .tracks-list li {
    font-size: 11.5px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.65);
    line-height: 1.4;
  }
  .tracks-list li .dot {
    color: rgba(255,255,255,0.2);
    margin-right: 4px;
  }
  .tracks-list li.has-track { color: rgba(255,255,255,0.85); }
  .tracks-list li.open-slot { color: rgba(255,255,255,0.28); font-style: italic; }

  .count-badge {
    display: inline-block;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 10px;
    margin-left: 6px;
    color: rgba(255,255,255,0.4);
    vertical-align: middle;
  }

  /* Header */
  #header {
    position: fixed;
    top: 0; left: 0;
    padding: 18px 24px;
    z-index: 50;
    pointer-events: none;
  }
  #header h1 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }
  #header .sub {
    font-size: 10px;
    color: rgba(255,255,255,0.18);
    margin-top: 3px;
    letter-spacing: 0.05em;
  }

  /* Hint */
  #hint {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.08em;
    pointer-events: none;
  }
</style>
</head>

  ["CDA","SS"],
  ["SS","LE"], ["SS","EE"],
  ["LE","GF"],
  ["GF","CR"], ["GF","AM"], ["GF","UK"],
  ["AM","IDM"],
  ["CR","GF"],
  ["IT","IDM"],
  ["IDM","IND"],
  ["IND","GF"],
  // Deep/Disco House sub-genera
  ["NDC","LFH"], ["NDC","BAL"],
  ["JSH","NDC"], ["JSH","LFH"], ["JSH","ACH"],
  ["LFH","UK"], ["LFH","IDM"],
  ["BAL","OH"], ["BAL","GF"],
  ["ACH","AF"],
  ["B25","JSH"],
];

// ─── GRAPH ────────────────────────────────────────────────────────────────────

const svg = d3.select("#canvas");
const W = window.innerWidth, H = window.innerHeight;

const g = svg.append("g");

// Zoom
svg.call(d3.zoom().scaleExtent([0.25, 3]).on("zoom", e => g.attr("transform", e.transform)));

// Build neighbor map
const neighborMap = {};
GENERA.forEach(n => neighborMap[n.id] = new Set());
EDGES.forEach(([a,b]) => { neighborMap[a].add(b); neighborMap[b].add(a); });

// Links
const linkSel = g.append("g")
  .selectAll("line")
  .data(EDGES.map(([s,t]) => ({source:s, target:t})))
  .join("line")
  .attr("class","link");

// Nodes
const nodeSel = g.append("g")
  .selectAll("g")
  .data(GENERA)
  .join("g")
  .attr("class","node")
  .call(d3.drag()
    .on("start", (e,d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag", (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on("end", (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
  )
  .on("click", (e,d) => openPanel(d));

nodeSel.append("circle")
  .attr("r", d => d.r)
  .attr("fill", d => d.color + "22")
  .attr("stroke", d => d.color);

// Label — handle newlines
nodeSel.each(function(d) {
  const parts = d.label.split("\n");
  const el = d3.select(this).append("text").attr("text-anchor","middle").attr("fill","#fff");
  if(parts.length === 1) {
    el.attr("dy","0.35em").text(parts[0]);
  } else {
    parts.forEach((p,i) => {
      el.append("tspan")
        .attr("x",0)
        .attr("dy", i===0 ? `${-(parts.length-1)*0.55}em` : "1.1em")
        .text(p);
    });
  }
});

// Simulation
const sim = d3.forceSimulation(GENERA)
  .force("link", d3.forceLink(EDGES.map(([s,t])=>({source:s,target:t}))).id(d=>d.id).distance(d => {
    const sr = GENERA.find(n=>n.id===d.source.id||n.id===d.source)?.r||30;
    const tr = GENERA.find(n=>n.id===d.target.id||n.id===d.target)?.r||30;
    return sr + tr + 55;
  }).strength(0.5))
  .force("charge", d3.forceManyBody().strength(d => -d.r * 18))
  .force("center", d3.forceCenter(W/2, H/2))
  .force("collision", d3.forceCollide(d => d.r + 18))
  .on("tick", () => {
    linkSel
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
  });

// ─── STATS ────────────────────────────────────────────────────────────────────

const totalTracks = GENERA.reduce((s,g) => s + g.tracks.filter(t=>t.inLibrary).length, 0);
const totalGenera = GENERA.length;
document.getElementById("stats").textContent =
  `${totalGenera} genera · ${totalTracks} catalogued tracks · ${EDGES.length} connections`;

// ─── PANEL ────────────────────────────────────────────────────────────────────

let activeNode = null;

function openPanel(d) {
  activeNode = d.id;

  // Highlight
  nodeSel.classed("active", n => n.id === d.id);
  linkSel.classed("highlighted", l =>
    l.source.id === d.id || l.target.id === d.id ||
    l.source === d.id || l.target === d.id
  );

  document.getElementById("panel-name").textContent = d.label.replace("\n"," ");
  document.getElementById("panel-era").textContent = d.era;
  document.getElementById("panel-desc").textContent = d.desc;

  // Connected genera
  const edgesEl = document.getElementById("panel-edges");
  edgesEl.innerHTML = "";
  [...neighborMap[d.id]].forEach(nid => {
    const neighbor = GENERA.find(n => n.id === nid);
    if(!neighbor) return;
    const tag = document.createElement("div");
    tag.className = "edge-tag";
    tag.textContent = neighbor.label.replace("\n"," ");
    tag.onclick = () => openPanel(neighbor);
    edgesEl.appendChild(tag);
  });

  // Tracks
  const inLib = d.tracks.filter(t=>t.inLibrary);
  const slots = d.tracks.filter(t=>!t.inLibrary);
  document.getElementById("panel-track-count").textContent = `${inLib.length} in library`;

  const ul = document.getElementById("panel-tracks");
  ul.innerHTML = "";
  inLib.forEach(t => {
    const li = document.createElement("li");
    li.className = "has-track";
    li.innerHTML = `<span class="dot">▸</span>${t.name}`;
    ul.appendChild(li);
  });
  if(slots.length) {
    const div = document.createElement("li");
    div.style.cssText = "font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.18);padding:10px 0 4px;border:none;";
    div.textContent = "Extension targets";
    ul.appendChild(div);
    slots.forEach(t => {
      const li = document.createElement("li");
      li.className = "open-slot";
      li.innerHTML = `<span class="dot">○</span>${t.name}`;
      ul.appendChild(li);
    });
  }

  document.getElementById("panel").classList.add("open");
}

document.getElementById("panel-close").onclick = () => {
  document.getElementById("panel").classList.remove("open");
  nodeSel.classed("active", false);
  linkSel.classed("highlighted", false);
  activeNode = null;
};

// Close on canvas click (not on node)
svg.on("click", (e) => {
  if(e.target.tagName === "svg" || e.target.tagName === "g") {
    document.getElementById("panel").classList.remove("open");
    nodeSel.classed("active", false);
    linkSel.classed("highlighted", false);
    activeNode = null;
  }
});

window.addEventListener("resize", () => {
  sim.force("center", d3.forceCenter(window.innerWidth/2, window.innerHeight/2));
  sim.alpha(0.1).restart();
});
</script>
</body>
</html>
