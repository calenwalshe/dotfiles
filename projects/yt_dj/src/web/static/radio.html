<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>radio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #c8c8c8;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
    }

    /* ---- cam container ---- */
    .cam-wrap {
      width: min(720px, 100%);
      aspect-ratio: 16/9;
      background: #0e0e0e;
      overflow: hidden;
      position: relative;
      border: 1px solid #1a1a1a;
    }

    .cam-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .cam-wrap iframe.loaded { opacity: 1; }

    /* fallback still-image */
    .cam-wrap img.still {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .cam-wrap img.still.loaded { opacity: 1; }

    /* location label */
    .cam-location {
      position: absolute;
      bottom: 10px;
      left: 12px;
      color: rgba(255,255,255,0.45);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    }

    /* rotation countdown */
    .cam-timer {
      position: absolute;
      bottom: 10px;
      right: 12px;
      color: rgba(255,255,255,0.2);
      font-size: 9px;
      letter-spacing: 0.08em;
      z-index: 10;
    }

    .cam-error {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      color: #222;
      font-size: 10px;
      letter-spacing: 0.1em;
    }
    .cam-wrap.error .cam-error { display: flex; }

    /* ---- player row ---- */
    .player-row {
      width: min(720px, 100%);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    audio {
      width: 100%;
      height: 32px;
      filter: invert(0.85) sepia(0.1);
    }

    .track-info {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 18px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #c0392b;
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    .track-name {
      color: #777;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      letter-spacing: 0.03em;
      flex: 1;
    }

    .cam-label {
      color: #333;
      font-size: 10px;
      letter-spacing: 0.08em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .footer {
      color: #222;
      font-size: 10px;
      letter-spacing: 0.14em;
    }
  </style>
</head>
<body>

  <div class="cam-wrap" id="camWrap">
    <iframe id="camFrame" title="live webcam" allowfullscreen
            allow="autoplay; fullscreen"></iframe>
    <img id="camStill" class="still" alt="" />
    <div class="cam-location" id="camLocation"></div>
    <div class="cam-timer" id="camTimer"></div>
    <div class="cam-error">no feed</div>
  </div>

  <div class="player-row">
    <audio id="player" controls autoplay preload="none">
      <source src="/stream.mp3" type="audio/mpeg">
    </audio>
    <div class="track-info">
      <div class="live-dot"></div>
      <div class="track-name" id="trackName">connecting…</div>
      <div class="cam-label" id="camLabel"></div>
    </div>
  </div>

  <div class="footer">live</div>

<script>
  // -----------------------------------------------------------------------
  // Curated 24/7 live city webcam streams on YouTube.
  // Video IDs are stable for continuous 24/7 live streams — they rarely change.
  // If a stream goes offline, the iframe shows YouTube's "offline" UI and
  // rotates to the next cam after CAM_ROTATE_MS milliseconds.
  // -----------------------------------------------------------------------
  const LIVE_CAMS = [
    { name: 'Times Square',          country: 'US', yt: 'rnXIjl_Rzy4' }, // EarthCam 4K
    { name: 'Shibuya Scramble',      country: 'JP', yt: 'dfVK7ld38Ys' }, // Fixed crossing cam
    { name: 'Sydney Harbour',        country: 'AU', yt: '5uZa3-RMFos' }, // Opera House 4K
    { name: 'Venice Beach',          country: 'US', yt: 'EO_1LWqsCNE' }, // Los Angeles
    { name: 'Abbey Road',            country: 'GB', yt: 'M3EYAY2MftI' }, // EarthCam London
    { name: 'Shinjuku Kabukicho',    country: 'JP', yt: 'DjdUEyjx8GM' }, // Tokyo Shinjuku
    { name: 'Dublin',                country: 'IE', yt: '3nyPER2kzqk' }, // EarthCam
    { name: 'Auckland Harbour',      country: 'NZ', yt: 'BQR800Gu28g' }, // 4K Skyline
    { name: 'Koh Samui Beach',       country: 'TH', yt: 'bbBGNNPu0rg' }, // Thailand 4K
    { name: 'Rome / Vatican',        country: 'IT', yt: 'VzPbcndoD40' }, // Prati & St. Peter's
    { name: 'San Francisco Bay',     country: 'US', yt: 'CXYr04BWvmc' }, // Bay Bridge 24/7
    { name: 'Kabukicho II',          country: 'JP', yt: 'gFRtAAmiFbE' }, // Tokyo nightlife
    { name: 'NYC Live',              country: 'US', yt: 'VGnFLdQW39A' }, // Streets & skyline
  ];

  // Shuffle so each page load starts at a different cam
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  const cams = shuffle([...LIVE_CAMS]);
  let camIdx = 0;

  const camFrame    = document.getElementById('camFrame');
  const camStill    = document.getElementById('camStill');
  const camWrap     = document.getElementById('camWrap');
  const camLocation = document.getElementById('camLocation');
  const camTimer    = document.getElementById('camTimer');
  const camLabel    = document.getElementById('camLabel');
  const trackName   = document.getElementById('trackName');

  // How long to show each webcam before rotating (ms)
  const CAM_ROTATE_MS = 5 * 60_000; // 5 minutes
  let rotateTimer = null;
  let countdownInterval = null;
  let rotateAt = 0;

  // --- Track metadata from Icecast ---
  async function refreshTrack() {
    try {
      const resp = await fetch('/status-json.xsl');
      if (!resp.ok) return;
      const data = await resp.json();
      const source = Array.isArray(data?.icestats?.source)
        ? data.icestats.source[0]
        : data?.icestats?.source;
      if (!source) return;
      const title = source.title || source.artist || '';
      if (title) trackName.textContent = title;
    } catch (_) {}
  }

  // --- Load a specific cam by index ---
  function loadCam(idx) {
    const cam = cams[idx % cams.length];
    const ytUrl = `https://www.youtube.com/embed/${cam.yt}?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&playsinline=1`;

    camWrap.classList.remove('error');
    camStill.classList.remove('loaded');
    camFrame.classList.remove('loaded');

    // Brief delay so the fade-out completes before src changes
    setTimeout(() => {
      camFrame.onload = () => camFrame.classList.add('loaded');
      camFrame.src = ytUrl;

      const loc = [cam.name, cam.country].filter(Boolean).join(', ');
      camLocation.textContent = loc;
      camLabel.textContent = loc.toUpperCase();
    }, 300);
  }

  // --- Rotation countdown ---
  function startCountdown() {
    clearInterval(countdownInterval);
    rotateAt = Date.now() + CAM_ROTATE_MS;
    countdownInterval = setInterval(() => {
      const secs = Math.max(0, Math.round((rotateAt - Date.now()) / 1000));
      const m = Math.floor(secs / 60);
      const s = String(secs % 60).padStart(2, '0');
      camTimer.textContent = `next ${m}:${s}`;
    }, 1000);
  }

  function scheduleCamRotation() {
    clearTimeout(rotateTimer);
    startCountdown();
    rotateTimer = setTimeout(() => {
      camFrame.classList.remove('loaded');
      camIdx = (camIdx + 1) % cams.length;
      loadCam(camIdx);
      scheduleCamRotation();
    }, CAM_ROTATE_MS);
  }

  // --- Bootstrap ---
  loadCam(camIdx);
  scheduleCamRotation();
  refreshTrack();

  // Refresh track metadata every 15s
  setInterval(refreshTrack, 15_000);
</script>
</body>
</html>
